<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('./images/background.jpg'); /* 背景图片路径 */
            background-size: 100%; /* 覆盖整个屏幕 */
            background-attachment: fixed;
            margin: 0;
            padding: 20px;
        }
        header {
            background-color: rgba(0, 115, 230, 0.8); /* 半透明的蓝色 */
            color: white;
            padding: 10px 20px;
            text-align: center;
        }
        section {
            margin-top: 20px;
            background-color: rgba(255, 255, 255, 0.8); /* 半透明的白色背景 */
            padding: 10px;
        }
        footer {
            margin-top: 20px;
            text-align: center;
            padding: 10px;
            background-color: rgba(0, 115, 230, 0.8);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <h1>欢迎来到我的个人主页</h1>
        <p>这里是简介文本或者欢迎信息。</p>
    </header>
    
    <section>
        <h2>关于我</h2>
        <p>这里写上关于你的一些信息，比如你的职业、兴趣爱好等。</p>
    </section>
    
    <section>
        <h2>我的项目</h2>
        <p>介绍你参与的项目或者你的个人项目。</p>
    </section>

    <footer>
        <p>版权所有 © 你的名字</p>
    </footer>
</body>
</html>
